# ──────────────────────────────────────────────
# raglab_ site config
# ──────────────────────────────────────────────
# IMPORTANT: change baseurl to match your repo name
baseurl: "/raglab-site"

title: "raglab_"
tagline: "building RAG pipelines in public"
description: >-
  One person building a hybrid RAG framework from scratch —
  ragforge — and documenting every step. Read the code,
  try the demos, learn the architecture.

# Your links
github_url: "https://github.com/Vaibhav1196/hybrid-rag-lab"
huggingface_url: "https://huggingface.co/yourname"
twitter_url: "https://twitter.com/yourname"
author_handle: "@vaibhav"

# Hero terminal
hero_lines:
  - type: command
    text: "pip install ragforge"
  - type: blank
  - type: heading
    text: "# ragforge"
  - type: output
    text: "hybrid RAG framework for Python."
  - type: output
    text: "BM25 + Dense + RRF Fusion + Cross-Encoder Reranking."
  - type: output_highlight
    text: "evaluation suite. observability. protocol-based. swappable."
  - type: blank
  - type: comment
    text: "# v0.1.0 — src-layout package, 13 test files, CLI scripts"
  - type: comment
    text: "# built in public at github.com/Vaibhav1196/hybrid-rag-lab"
  - type: blank
  - type: command_cursor
    text: "raglab --list-stages"

# Newsletter
newsletter_comment: "// get notified when I ship new pipeline stages"
newsletter_text: "No spam. Just a short email when a new stage goes live or when I find something worth sharing."

# Build settings
markdown: kramdown
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
