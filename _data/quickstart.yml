# ──────────────────────────────────────────────
# Quick start — installation + first example
# ──────────────────────────────────────────────

install: |
  git clone https://github.com/Vaibhav1196/hybrid-rag-lab.git
  cd hybrid-rag-lab
  uv venv .venv --python 3.11
  uv pip install -e ".[dev]"

example_title: "run hybrid retrieval in 5 lines"
example: |
  from ragforge.retrieval.pipeline import HybridPipeline

  pipeline = HybridPipeline.from_directory("/path/to/data", chunk_size=300, overlap=50)
  results  = pipeline.search("what is hybrid retrieval", top_k=3)

  for r in results:
      print(f"{r.score:.4f}  {r.chunk.doc_id}  {r.chunk.text[:80]}...")

example_output: |
  0.0323  hybrid_retrieval  Hybrid retrieval combines sparse retrieval, such as BM25...
  0.0161  rag               Retrieval-Augmented Generation, or RAG, is a pattern...
  0.0161  langchain          LangChain is a framework designed to simplify the...

cli_title: "or use the CLI scripts"
cli_commands:
  - cmd: "uv run python scripts/retrieval/run_bm25_retrieval.py --data-dir /path/to/data --query 'hybrid retrieval' --top-k 3"
    label: "Run BM25 retrieval"
  - cmd: "uv run python scripts/retrieval/run_dense_retrieval.py --data-dir /path/to/data --query 'hybrid retrieval' --top-k 3"
    label: "Run dense retrieval"
  - cmd: "uv run python scripts/retrieval/run_hybrid_retrieval.py --data-dir /path/to/data --query 'hybrid retrieval' --top-k 3"
    label: "Run hybrid retrieval"
  - cmd: "uv run python scripts/retrieval/run_reranked_retrieval.py --data-dir /path/to/data --query 'hybrid retrieval' --top-k 3 --candidate-top-k 3"
    label: "Run reranked retrieval"
  - cmd: "uv run python scripts/generation/run_rag_pipeline.py --data-dir /path/to/data --query 'What is RAG?' --llm-mode fallback --retrieval-top-k 3 --candidate-top-k 3"
    label: "Run end-to-end RAG"
  - cmd: "uv run python scripts/evaluation/run_retrieval_evaluation.py --pipeline reranked --data-dir /path/to/data --eval-path /path/to/retrieval_eval.jsonl --top-k 3 --candidate-top-k 3"
    label: "Benchmark retrieval"
  - cmd: "uv run pytest"
    label: "Run the test suite"
