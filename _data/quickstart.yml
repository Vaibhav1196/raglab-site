# ──────────────────────────────────────────────
# Quick start — installation + first example
# ──────────────────────────────────────────────

install: |
  $ git clone https://github.com/Vaibhav1196/hybrid-rag-lab.git
  $ cd hybrid-rag-lab
  $ uv venv .venv --python 3.11
  $ uv pip install -e ".[dev]"

example_title: "run hybrid retrieval in 5 lines"
example: |
  from ragforge.retrieval.pipeline import HybridPipeline

  pipeline = HybridPipeline.from_directory("data/", chunk_size=300, overlap=50)
  results  = pipeline.search("what is hybrid retrieval", top_k=3)

  for r in results:
      print(f"{r.score:.4f}  {r.chunk.doc_id}  {r.chunk.text[:80]}...")

example_output: |
  0.0323  hybrid_retrieval  Hybrid retrieval combines sparse retrieval, such as BM25...
  0.0161  rag               Retrieval-Augmented Generation, or RAG, is a pattern...
  0.0161  langchain          LangChain is a framework designed to simplify the...

cli_title: "or use the CLI scripts"
cli_commands:
  - cmd: "uv run python scripts/run_bm25.py --query 'hybrid retrieval' --top-k 3"
    label: "BM25 sparse retrieval"
  - cmd: "uv run python scripts/run_dense.py --query 'hybrid retrieval' --top-k 3"
    label: "Dense semantic retrieval"
  - cmd: "uv run python scripts/run_hybrid.py --query 'hybrid retrieval' --top-k 3"
    label: "Hybrid (BM25 + Dense + RRF)"
  - cmd: "uv run python scripts/run_rerank.py --query 'hybrid retrieval' --top-k 3"
    label: "Reranked hybrid"
  - cmd: "uv run python scripts/run_rag.py --query 'What is RAG?' --llm-mode fallback"
    label: "End-to-end RAG"
  - cmd: "uv run pytest -v"
    label: "Run test suite"
